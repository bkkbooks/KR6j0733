body:
  text: 佛頂尊勝陀羅尼經出南北藏唐周罽賓沙門佛陀波利奉詔譯如是我聞一時薄伽梵在室羅筏住誓多林給孤獨園與大苾芻衆千二百五十人俱又與諸大菩薩僧萬二千人俱爾時三十三天於善法堂會有一天子名曰善住與諸大天遊於園觀又與大天受勝尊貴與諸天女前後圍繞歡喜遊戲種種音樂共相娛樂受諸快樂爾時善住天子即於夜分聞有聲言善住天子却後七日命將欲盡命終之後生贍部洲受七返畜生身即受地獄苦從地獄出希得人身生於貧賤處於母胎即無兩目爾時善住天子聞此聲已即大驚怖身毛皆豎愁憂不樂速疾往詣天帝釋所悲啼號哭惶怖無計頂禮帝釋二足尊已白帝釋言聽我所說我與諸天女共相圍繞受諸快樂聞有聲言善住天子却後七日命將欲盡命終之後生贍部洲七返受畜生身受七身已即墮諸地獄從地獄出希得人身生貧賤家而無兩目天帝云何令我得免斯苦爾時帝釋聞善住天子語已甚大驚愕即自思惟此善住天子受何七返惡道之身爾時帝釋須臾靜住入定諦觀即見善住當受七返惡道之身所謂猪狗野干獼猴蟒蛇烏鷲等身食諸穢惡不淨之物爾時帝釋觀見善住天子當墮七返惡道之身極助苦惱痛割於心諦思無計何所歸依唯有如來應正等覺令其善住得免斯苦爾時帝釋即於此日初夜分時以種種華鬘塗香末香以妙天衣莊嚴執持往詣誓多林園於世尊所到已頂禮佛足右繞七匝即於佛前廣大供養佛前䠒跪而白佛言世尊善住天子云何當受七返畜生惡道之身具如上說爾時如來頂上放種種光遍滿十方一切世界已其光還來繞佛三匝從佛口入佛便微笑告帝釋言天帝有陀羅尼名為如來佛頂尊勝能淨一切惡道能淨除一切生死苦惱又能淨除諸地獄閻羅王界畜生之苦又破一切地獄能回向善道天帝此佛頂尊勝陀羅尼若有人聞一經於耳先世所造一切地獄惡業皆悉消滅當得清淨之身隨所生處憶持不忘從一佛剎至一佛剎從一天界至一天界遍歷三十三天所生之處憶持不忘天帝若人命欲將終須臾憶念此陀羅尼還得增壽得身口意淨身無苦痛隨其福利隨處安隱一切如來之所觀視一切天神恆常侍衛為人所敬惡障消除一切菩薩同心覆護天帝若人能須臾讀誦此陀羅尼者此人所有一切地獄畜生閻羅王界餓鬼之苦破壞消滅無有遺餘諸佛剎土及諸天宮一切菩薩所住之門無有障礙隨意遊入爾時帝釋白佛言世尊唯願如來為衆生說增益壽命之法爾時世尊知帝釋意心之所念樂聞佛說是陀羅尼法即說呪曰此呪最後別翻那謨引薄伽跋無可反下同帝引一啼隸二合引轉舌路迦二合稽㖿反鉢囉二合底丁以反毗失瑟咤二合引㖿余何反下同長聲勃陀引耶一云皈命聖尊三世勝覺二薄伽跋底引三怛姪他引四唵長五毗輸引䭾音太耶娑摩三漫音曼多皤婆娑六婆破囉拏揭底伽訶那七婆婆皤輸秫輸律反下音同地阿鼻詵去聲者蘇揭多伐折那引八阿㗚二合轉舌多毗囇雞反罽平聲九阿上聲訶囉去聲阿引訶囉下同十阿去引瑜散陀長聲羅尼十一輸舜入䭾音太下同耶輸䭾耶十二伽伽那去聲毗秫提十三烏瑟尼沙二合引毗逝耶秫提十四娑訶娑囉二合喝囉濕弭二合珊珠地帝十五薩婆怛他揭多地瑟咤二合引長聲那頞地瑟恥二合帝丁你反慕音母𭉐隸音梨十六跋折羅二合迦長聲耶僧訶多那秫提十七薩婆引伐羅拏毗秫提十八鉢羅二合底丁你反你伐晚發反轉舌怛耶阿引去瑜秫提十九薩末那引阿地瑟二合耻帝音低二十末禰末禰二十一怛闥多去引部多俱胝鉢唎秫提二十二毗音弭薩音悉普二合吒勃地秫提二十三社耶社耶余何反下同二十四毗社耶毗社耶二十五薩末二合囉薩末囉二合勃陀頞地瑟恥多秫提二十六跋折囉揭二十七跋折濫婆伐都二十八麼麼受持者於此自稱名薩婆薩埵𡃂迦長聲耶毗秫提二十九薩婆揭底丁你反鉢唎秫提三十薩婆怛他去引揭多去引三摩濕婆娑遏地瑟耻帝低字呼三十一勃陀地耶反勃陀同上蒱䭾音太耶蒱馱耶三漫多鉢唎秫提三十二薩婆怛他揭多地瑟咤二合引長聲那引頞地瑟耻二合帝三十三娑婆訶引佛告帝釋言此呪名淨除一切惡道佛頂尊勝陀羅尼能除一切罪業等障能破一切穢惡道苦天帝此陀羅尼八十八殑伽沙俱胝百千諸佛同共宣說隨喜受持大如來智印印之為破一切衆生穢惡道苦故為一切地獄畜生閻羅王界衆生得解脫故臨急苦難墮生死海中衆生得解脫故短命薄福無救護衆生樂造雜染惡業衆生故說又此陀羅尼於贍部洲住持力故能令地獄惡道衆生種種流轉生死薄福衆生不信善惡業失正道衆生等得解脫義故佛告天帝我說此陀羅尼付囑於汝汝當授與善住天子復當受持讀誦思惟愛樂憶念供養於贍部洲一切衆生廣為宣說此陀羅尼亦為一切諸天子故說此陀羅尼印付囑於汝天帝汝當善持守護勿令忘失天帝若人須臾得聞此陀羅尼千劫已來積造惡業重障應受種種流轉生死地獄餓鬼畜生閻羅王界阿修羅身夜叉羅剎鬼神布單那羯吒布單那阿波娑摩羅蚊虻龜狗蟒蛇一切諸鳥及諸猛獸一切蠢動含靈乃至蟻子之身更不重受即得轉生諸佛如來一生補處菩薩同會處生或得大姓婆羅門家生或得大剎利種家生或得豪貴最勝家生天帝此人身得如上貴處生者皆由聞此陀羅尼故轉所生處皆得清淨天帝乃至得到菩提道場最勝之處皆由讚美此陀羅尼功德如是天帝此陀羅尼名吉祥能淨一切惡道此佛頂尊勝陀羅尼猶如日藏摩尼之寶淨無瑕穢淨等虗空光焰照徹無不周遍若諸衆生持此陀羅尼亦復如是亦如閻浮檀金明淨柔軟令人喜見不為穢惡之所染著天帝若有衆生持此陀羅尼亦復如是乘斯善淨得生善道天帝此陀羅尼所在之處若能書寫流通受持讀誦聽聞供養能如是者一切惡道皆得清淨一切地獄苦悉皆消滅佛告天帝若人能書寫此陀羅尼安高幢上或安高山或安樓上乃至安置窣堵波中天帝若有苾芻苾芻尼優婆塞優婆夷族姓男族姓女於幢等上或見或與相近其影映身或風吹陀羅尼山幢等上塵落在身上天帝彼諸衆生所有罪業應墮惡道地獄畜生閻羅王界餓鬼阿修羅身惡道之苦皆悉不受亦不為罪垢染汙天帝此等衆生為一切諸佛之所授記皆得不退轉於阿耨多羅三藐三菩提天帝何況更以多諸供具華鬘塗香末香幢幡蓋等衣服瓔珞作諸莊嚴於四衢道造窣堵波安置陀羅尼合掌恭敬旋繞行道歸依禮拜天帝彼人能如是供養者名摩訶薩埵真是佛子持法棟梁又是如來全身舍利窣堵波塔爾時閻摩羅法王於時夜分來詣佛所到已以種種天衣妙華塗香莊嚴供養佛已繞佛七匝頂禮佛足而作是言我聞如來演說讚持大力陀羅尼者我常隨逐守護不令持者墮於地獄以彼隨順如來言教而護念之爾時護世四天大王繞佛三匝白佛言世尊唯願如來為我廣說持陀羅尼法爾時佛告四天王汝今諦聽我當為汝宣說受持此陀羅尼法亦為短命諸衆生說當先洗浴著新淨衣白月圓滿十五日時持齊誦此陀羅尼滿其千遍令短命衆生還得增壽永離病苦一切業障悉皆消滅一切地獄諸苦亦皆解脫諸飛鳥畜生含靈之類聞此陀羅尼一經於耳盡此一身更不復受佛言若人遇大惡病聞此陀羅尼即得永離一切諸病亦得消滅應墮惡道亦得除斷即得往生寂靜世界從此身已後更不受胞胎之身所生之處蓮花化生一切生處憶持不忘常識宿命佛言若人先造一切極重罪業遂即命終乘斯惡業應墮地獄或墮畜生閻羅王界或墮餓鬼乃至墮大阿鼻地獄或生水中或生禽獸異類之身取其亡者隨身分骨以土一把誦此陀羅尼二十一遍散亡者骨上即得生天佛言若人能日日誦此陀羅尼二十一遍應消一切世間廣大供養捨身往生極世界若常誦念得大涅槃復增壽命受勝快樂捨此身已即得往生種種微妙諸佛剎土常與諸佛俱會一處一切如來恆為演說微妙之義一切世尊即授其記身光照曜一切佛剎土佛言若誦此陀羅尼法於其佛前先取淨土作壇隨其大小方四角作以種種草花散於壇上燒衆名香右膝著地䠒跪心常念佛作慕陀羅尼印屈其頭指以大拇指壓合掌當其心上誦此陀羅尼一百八遍訖於其壇中如雲王雨華能遍供養八十八俱胝殑伽沙那庚多百千諸佛彼佛世尊咸共讚言善哉希有真是佛子即得無障礙智三昧得大菩提心莊嚴三昧持此陀羅尼法應如是佛言天帝我以此方便一切衆生應墮地獄道令得解脫一切惡道亦得清淨復令持者增益壽命天帝汝去將我陀羅尼授與善住天子滿其七日汝與善住俱來見我爾時天帝於世尊所受此陀羅尼法奉持還於本天授與善住天子爾時善住天子受此陀羅尼已滿六日六夜依法受持一切願滿應受一切惡道等苦即得解脫住菩提道增壽無量甚大歡喜高聲歎言希有如來希有妙法希有明驗甚為難得令我解脫爾時帝釋至第七日與善住天子將諸天衆嚴持華鬘塗香末香寶幢幡蓋天衣瓔珞微妙莊嚴往詣佛所設大供養以妙天衣及諸瓔珞供養世尊繞百千匝於佛前立踊躍歡喜坐而聽法爾時世尊舒金色臂摩善住天子頂而為說法受菩提記佛言此經名淨一切惡道佛頂尊勝陀羅尼汝當受持爾時大衆聞法歡喜信受奉行讀呪法注平上去入者從四聲法借音讀注半音者半聲讀注二合者半上字連聲讀注重字者帶㗋聲重讀注長者長聲讀注反者從反借音讀羅利盧栗黎藍等字傍加口者轉聲讀佛頂尊勝陀羅尼經次念補闕真言曩謨喝囉怛那多囉夜耶佉囉佉囉俱住俱住摩囉摩囉虎囉吽賀賀蘇怛拏吽潑沫拏娑婆訶後舉讚云天帝啓請佛頂放光宣說尊勝總持王救苦妙難量滅罪生方諸佛盡稱揚南無尊勝會上佛菩薩三稱末結回向偈願以此功德莊嚴佛淨土上報四重恩下濟三途苦若有見聞者悉發菩提心盡此一報身同生極樂國誦畢三禮而退音釋序婆羅門翻云淨行佛陀婆利唐云覺護儀鳳唐高宗年號文殊師利唐云妙吉祥菩薩名謁音一禮也憚音但懼也劬音渠勤也陀羅尼此云總持亦云遮持呪也拯音丞救也愕音壑惶恐也曰照梵名地婆訶羅捐音絹捨也譯音易翻也咨音恣審决也勘音看考對也經罽音雞薄伽梵唐翻聖尊釋迦佛也室羅筏唐言豐德城名誓多此云戰勝太子名給孤獨梵語須達多長者名苾芻羅漢僧也喻香草含五德義菩薩此翻覺有情贍部翻勝金南洲名詣音異至也閻羅翻遮或靜息地獄王也迦音加囉音辣咤音吒㖿音耶怛音但皤波婆二音秫音朮弭音彌𭉐音迭𡃂音瀉蒱音葡殑伽恆河名俱胝翻百億阿修羅此云無端正又云非天夜叉翻云暴惡羅剎此云可畏布單那此云臭餓鬼羯吒此云奇阿波娑摩羅此云青色鬼剎利王種也秦言田主菩提翻覺摩尼翻離垢珠寶名幢音床旗幡屬窣堵波塔也苾芻出家男僧也苾芻尼出家女僧也優婆塞夷出家近住男女亦名善宿男女族姓男女在家近事男女亦名淨信士女阿耨多羅三藐三菩提華言無上正等正覺摩訶薩埵秦言大道菩薩舍利此云堅固子匝音勺旋繞也宿命六通之一阿鼻此云無間涅槃此言滅度那庚多此云萬億三昧此云正定踊躍音湧瀹足蹈意法數先序分分二一證信序二發起序善住歿後三報一七返畜生二受地獄苦三貧胎目瞎七返畜報一猪二狗三野干四猴五蟒六鳥七鷲次正宗分開四一帝釋會又分二初呪前略顯帝釋四供花鬘香衣說呪二瑞一放光二微笑呪含五益一淨惡道二除生死三離鬼畜四破地獄五善道聞呪三益一先惡業消二當得淨身三生處不忘讀誦呪二益一三惡道苦破滅二佛土天宮隨人命𣧩憶呪十益一還增壽二三業淨三無苦痛四隨福利五處安穩六佛觀視七天神護八人所敬九惡障除十菩薩覆二呪後詳明呪開四名一名淨除惡道二名佛頂尊勝三名吉祥四名大力淨除呪名二益相一除一切罪業等障二破一切穢惡道苦佛頂呪名三益相一如摩尼寶二淨等虛空三光焰徹照吉祥呪名一益相清淨一切惡道大力呪名二益相一閻王守護二地獄不墮八十八佛傳呪四相一同共宣說二互相隨喜三皆各受持四一切智印為八衆生一為破一切穢惡道苦衆生二為脫一切畜類閻羅王界衆生三為解臨急厄難墮苦海中衆生四為短命薄福無救護衆生五為樂造雜染惡業衆生六為地獄惡道衆生七為種種流轉生死衆生八為不信善惡業失正道衆生為三人天一為善住天子二為一切諸天三為贍部洲一切衆生授付六法一受持二讀誦三思惟四愛樂五憶念六供養聞離二障益一離千劫惡業障二離種種苦報障聞呪果報十益一不落三途二不受鬼神三不墮畜生四諸如來處五菩薩補處六婆羅門生七剎利種生八豪貴家生九生處清淨十菩提場處受持二益一令人喜見二得生善道書讀二益一淨諸惡道二滅地獄苦供養幢塔山樓四益一離惡道苦二罪垢不染三諸佛受記四得三菩提香花幡絡供禮四勝名稱一名摩訶薩二真是佛子三持法棟梁四即佛全身二閻王會閻王設三供養一天衣二妙花三塗香持呪二法一順佛言教二護自心念持者二益一現在冥王擁護二當來不令墮獄三四天會所為五根衆生各益一望齊千遍為短命衆生令得四益一增壽命二離病苦三消業障四脫獄報二持令人聞為惡病衆生令得六益一大疾離二諸病消三惡道斷四生淨界五蓮花生六得宿命三土散亡身為極重罪惡命終衆生令得二益一離三途苦二生天受樂四日誦草一為受人廣大供養衆生令得二益一現得消受二當生樂土五常時誦念為一切循常衆生令得八益一得大涅槃二增延壽命三受勝妙樂四往諸佛剎五常與佛會六佛為說法七受佛記莂八身光遍照禽獸蟲蟻蜎蠕含靈聞聲二益一盡此一身二更不墮畜母陀羅印此翻手印應云合二手掌屈二頭指二大拇指壓上當其心前誦呪百八一名最勝王印二名尊勝幢印結印想誦六益一空雨花雲二遍共諸佛三佛讚奇善四真是佛子五得無礙智六大心莊嚴四善住會七日夜持三益一解脫地獄二淨諸惡道三增延壽命善住六日夜受持四益一一切願滿二脫惡道苦三住菩提道四增壽無量歎四希有一如來二呪法三明驗四解脫善住天設八供花鬘香幢幡蓋衣珞佛與善住天三益一摩頂二說法三受記後流通分亦二一結名敕持二衆喜奉行問答居士問呪可釋耶余答曰前後法益名相咸佛釋呪義也曰前後何重說耶曰一者法義無盡故二者互不相濫故若以清凉十門判釋此經所為五根二十二益第一教起因緣門也三藏中經四藏中呪三乘中大四乘中佛十二分中授記因緣未曾有修多羅佛頂放光微笑說此尊勝呪經授記善住天子者也此即第二藏乘分攝門也經文顯教也聞呪十報中一二三六七八小教義五四九十始終頓圓教義又常念八益中一二三小教義四五六始終頓義七八圓教義呪語密教也呪開四名淨惡小教義大力始教義吉祥終教義佛頂頓教義合四圓教義佛言此名淨一切惡道佛頂尊勝陀羅尼是也又母陀羅印手結印也成佛報身誦百八遍口持呪也成佛化身緣念句益心觀想也成佛法身三業相應即瑜伽尊勝三昧不空如來藏心觀也歸無所得即無障礙智三昧空如來藏心觀也有無不離一心中現即佛大菩提心莊嚴三昧空不空如來藏心觀也此是第三教義分齊門也為三人天為八衆生第四所被機宜門也諸佛傳持四相善住歎四希有宣說呪法隨相義受持明驗唯識義隨喜解脫歸性義如來智印無礙義第五教體淺深門也善住六日受持四益即是淨一切惡道滿一切智願住菩提道增無量壽以為宗趣第六宗趣通局門也唐之六譯同部也宋後四譯同類也第七部類差別門也餘諸前後因果法益第八傳持感通門也佛言天帝有陀羅尼名為如來佛頂尊勝第九總出名題門也經分三分如是我聞去序分也中有二初六種證信序爾時三十三天下二二緣發起序分二一善住聞聲求救爾時帝釋聞下二天帝觀見懇佛爾時帝釋即於去正宗分也內開四一帝釋會佛委開悟爾時閻摩下二閻王會設供讚持爾時四天下三四天會願說法要佛言天帝下四善住會受持功果佛言此經去流通分也亦分二一結名傳持爾時大衆下二衆喜奉行此即第十別釋文義門也孟不云乎觀水有術必觀其瀾斯乃法海觀瀾也當知是經義不可思議果報亦不可思議吾故表而出之習斯文者毋疑議焉此亦約多字陀羅尼以說若無字陀羅尼請向佛頂未放光前去參東林老行者續法録記日本國黃檗山僧友書慈雲七辛朽老續法合十白言時八月初一日也餘情縷縷不及煩瑣但望海東雲日瞻想不盡而已七月十八寄來尊勝經鈔細詳精粹末法流通誠人天之眼目苦海中之光明幢也所叉八譯與余序中十譯呪中翻梵成唐與余𦦨口摘釋尊勝呪內華梵並皆小異大同如是注經真佛門之法將如是出家真僧林之龍象非彼顢頇之說儱侗之談可比如摩尼帝網難盡讚揚又寄深密二部藏祕玉函逮今顯現即金字二圖如優曇花難逢遇者第密部理趣最奧梵字義旨幽深余在呪藏經書翻閲百十餘部留心已歷多載見此圖尚不曉了況餘不尋密部不研呪語豈知梵字音畫真言微妙也哉今將高共經厨二圖精裱玉軸客常瞻禮細考當為毗盧佛眷三十七聖法子也謝謝余新刻華嚴別行六卷計十四品緣起詳述序中近今發心作疏鈔演義記到菩薩住處品內海中有金剛山菩薩名曰法起清凉疏曰海東人相傳此山往往有聖人出現菩薩即曇無竭常啼菩薩之友也當麻寺記略而未詳但云化役行者是法起再來寺與金剛峯相去五十里今煩訪法起菩薩山上道場神聖靈跡祈詳載寄來已便鈔記萬萬尊勝佛頂真言持念法按南北藏尊勝經有五譯預譯名氏并附沙門佛陀波利唐言覺護北印度罽賓國人亡身徇道遍觀靈跡聞文殊師利在清涼山遠涉流沙躬來禮謁以天皇儀鳳元年景子杖錫五臺䖍誠禮拜悲泣雨淚望覩聖容倐焉見一老翁從山中出來作婆羅門語謂波利曰師精誠懇惻何所求耶波利答曰聞文殊大士隱跡此山從印度來欲求贍禮翁曰師從彼國將佛頂尊勝陀羅尼經來不此土衆生多造諸罪出家之輩亦多所犯佛頂神呪除罪祕方若不將經徒來何益縱見文殊何必能識師可還西國取彼經來流傳此土即是遍奉衆聖廣利羣生拯濟幽冥報諸佛恩也師取經來至此弟子當示師文殊師利菩薩所在波利聞此語已不勝喜躍遂裁抑悲淚向山更禮舉頭之頃忽不見老人波利驚愕倍增䖍敬遂返歸本國取得經來既達帝城便求進見有司具狀聞奏天皇賞其精誠崇斯祕典遂詔鴻臚寺典客令杜行顗及日照三藏於內共譯譯訖襯絹三十匹經留在內波利因乃垂泣奏曰委棄身命志在利人請布流行是所誠望帝愍其專至遂留所譯之經還其梵本任將流布波利得經不勝喜躍將向西明寺訪得善梵語僧順貞共翻譯帝允其請遂對諸大德共貞翻出名佛頂尊勝陀羅尼與前杜令所翻之者呪韻經文大同小異波利所願已異持經梵本入於五臺於今不出莫知所之比諸衆譯此最弘布此文出唐開元釋教録卷第九謹按國初時雲棲耆宿廣彰過祥符寺覩寶幢上供斯經呪不勝慶讚焚香録出摹刻於張居士佐平張因俗務遲未能刊印至庚辰六月課誦耳室忽聞震聲移座趣視見戶內電光一熌之狀驚疑數日睡夢間憶昔老僧所勸早起檢經笥中得遘尊勝經呪不覺惶悚急為刊施間遇友人送一文殊聖像至家居士倍生敬仰矢願裝金禮供憶昔波利尊者遇見化身與斯親覲聖容同一感應也至信於持誦感通依經所說法益實多當信佛語尊勝佛頂真言持念法此善住天子受快樂後夜分有聲告言知七日後命將欲盡生贍部洲受七返畜生身即受地獄苦從地獄出希得人身生於貧賤處母胎時即無兩目詣天帝釋所悲號啼哭冀免斯苦天帝釋即與俱往佛所具以白佛佛為說此真言使其先世惡業消滅無餘壽命增延受菩提記印相二手合掌屈二頭指甲相背以大二指押二頂指頭如彈指勢真言曰夫建尊勝菩薩曼荼羅者當以繩絣九位中央安毗盧遮那佛位右邊安觀自在菩薩位觀自後安慈氏菩薩位毗盧遮那佛位後安虗空藏菩薩位此菩薩左邊安普賢菩薩位毗盧遮那佛位左邊安金剛手菩薩位金剛手位下安文殊師利菩薩文殊師利右邊安除蓋障菩薩位除蓋障右邊安地藏菩薩位是名九位行者作曼荼羅如法供養已次想自身於心中有圓明月輪了了分明於月輪上想缺字白色放大光明遍照十方一切世界思惟缺字實相義所謂一切法等同虗空離諸色相離諸障礙則於真實理中觀自身作金剛波羅密佛母菩薩像左手執蓮華華上有五股金剛杵右手仰掌垂手為施願勢其頭冠瓔珞面貌慈愍拔濟一切衆生勢念誦時常作此觀想一切所願無不成就若有四部弟子等為供養故書此真言安七寶塔中若金剛臺中若高幢頭若有造十惡五無間業一切重罪應生閻魔羅界乃至六趣是罪人等若於此真言塔邊往來塔上微塵落其身上如上諸罪悉皆除滅或有風過吹其塔寺而復吹人少霑身分即得生天受勝妙藥亦隨意樂往生淨土若有持是真言者適欲洗手以水灌掌其水墮地霑灑蟲蟻是諸蟲等即得生天若有苦難衆生知罪極重常於白月十五日洗浴清淨著淨衣裳受八戒齊於菩薩像前正心在跪誦此真言一千八遍是人所有諸罪業障悉皆消滅當得總持陀羅尼門辨才無礙清淨解脫或雖未誦持但得聞此真言音聲一經耳者即能熏其賴耶為佛種子譬如小許金剛墮於地上即能穿入其地雖厚不能留礙決至本際方乃當住此真言亦爾一經耳者即能熏其習性要成正覺煩惱雖重亦不障蔽設復墮於餓鬼地獄畜生終不為諸業報令其沈沒要當乘真言力任運增修至於佛地若人初亡及亡已久有人以此真言加持黃土一把滿二十一遍散其骸上而是亡者即得往生十方淨土若亡者魂識已入地獄畜生餓鬼閻羅趣者其土霑骨便能解脫即捨惡趣而得生天若有短命衆生欲求長壽者於白月十五日洗浴齊戒誦是真言滿千八遍令短命者還得長壽一切業障悉皆消滅若復有人就於一切畜生耳中誦是真言唯一遍者而是畜生耳根以聞是真言故盡此一形不復更授禽畜之身如是佛頂真言於末法時若有依法作曼拏羅清淨塗地若以土以水以香水及瞿摩夷而嚴飾之散花燒香幢蓋幡燈種種珍寶飲食供養之者是即名為施波羅密奉手動足不失律儀是即名為戒波羅密營壇之時有惱不瞋是即名為忍波羅密修壇勤勇不懈不怠是即名為進波羅密專明法則一心不亂是即名為禪波羅密布置端正不喎不邪善至分齊可與不可是即名為般若波羅密附記過去毗婆尸佛時善住天子為婆羅門子早喪其父其母孤養年漸長大向田營種貧母為之處處求食未得之間食時稍晚其子饑渴明心恚母便出惡言今日何緣不來送食我母今日不如畜生我見猪狥野干獼猴烏鷲之類養育兒子為憐念故猶尚不令饑渴如是未久之間母持食來適坐飲食忽於空中見一辟支佛飛從南來其子歡喜心生敬仰頭面作禮邀屈臨降敷白茅座獻淨妙花減其食分持以奉上比丘食已為設法要其子於後出家而作維那時有施主送多酥油時諸客僧在於寺食向維那索酥油食維那不與復罵之曰汝等何不噉屎噉尿索酥油耶汝眼盲耶見有酥油我匿之乎佛言三界慈愛唯有父母三世福田不過衆僧由其恚言將畜比母今招七返作畜生身又由作維那時出食穢言令其常食不淨罵盲瞎故得無目報由供養辟支佛故令受天福其空中神預報之者即是善住守殿神也真寂大師柬聞啓祥居士及諸護法建尊勝幢書初九抵暮接手書諭令劉原明即日進城因馮懋遠公囑刻護國仁王經急欲散諸叢林勸持以報國家將完只缺四五日工夫所以擔閣非彼故違前尊勝幢因緣諸公任勞任怨不識曾結此案否昨承臯亭金臺兄到真寂說吾兄以此事切囑之且出兄手書觀之已知兄認真宏護直欲東南太平全仗率覩波尊勝陀羅尼加被也弟即與覺海法師再三勸擔當此緣伊固辭固請乃至稽首作禮伊即發願擔當弟輩助之顧今四十年各處干戈橫起塗毒傷殘可憐可憐獨我兩浙安如磐石豈我生民帶來福報若是深厚耶恐是我佛無緣慈悲冥被亦是生民善根發現戒殺放生所致也況此經此呪專為援救業重衆生千有餘年藏匿牆壁間忽然出現豈非佛力法力舍利威神使兩浙生靈終不受被蟊賊攙槍耶如五代有永明定光佛諸大宗師善知識得道乃至放生修淨業興隆三寶加被衆生遂感錢氏外護保守十四州五十餘年中安靜如樂國不曾傷一生竟不知有五代之煩煎雖云外護實三寶威神所加也故此勝緣極當著力金臺兄雖是承當還乞諸公合力出一公書請之萬全之計也何如深酌之弟誠退槽之馬彼誠倔起英雄可不盡心盡禮哉弟見兄勸伊書云舉筆一字如千斤弟正閃腰極楚間篝燈草此亦一字不啻千金也統祈菩提心中鑑照按大師明季人聞子將乃杭州名士法藏禪院諾庵師與豫言及歲夏秋間彌通師在四明鄮山董葺舍利殿事暇則禮舍利塔一日於故紙堆中檢出尊勝經及尊勝呪見注釋載明明季兵戈所在皆遭荼毒而兩浙獨全豈非浙省為七佛地善信居多戒殺放生誦經持呪故我佛慈恩加佑歟師以禮塔精誠悲願所格忽現此無上法寶因亟謀印送而板已無存師歸杭出示達成師師遂力任剞劂其徒定法普明亦欣然樂從嗚呼佛法不可思議持誦功德亦不可思議惟有敬祝善信諸君廣印流通俾得家持戶誦兼之戒殺放生自然民安物阜浪靜波恬蓋此經此有二善焉一則可以超度陳亡軍民人等藉生淨域一則可以保護現生貴官長者居士良民增福延年消災度厄功固無涯矣鐫既竣屬豫以述其巔末云咸豐癸丑嘉平葉龍光謹識白香山居士記蘇州重元寺石壁經云攝四生九類入無餘涅槃實無得度者莫先於金剛經懷罪集福淨一切惡道莫急於尊勝陀羅尼經夫經之來自西域其迹甚奇其事甚難文殊菩薩一言佛陀波利遂跋涉數萬里捨命擔經而來五臺波利殆尊者再生歟抑諸佛密呪至此時而始得行於中國也嘗考觀妙齊金石金文字記言唐時尊勝經幢凡數十處此獨以張少悌之書而存之是是經固盛行於唐時矣而明季真寂大師柬聞居士書言此經藏匿牆壁間千有餘年忽然出現國初時雲棲老僧廣彰觀祥符寺寶幢經呪不勝喜幸歎為生平所未見噫尊勝經呪何唐時之盛行而數百年來之閴寂無聞也葉君龍光云禪人彌通曾見注釋本於鄮山阿育皇寺僕所見者祇四明錢塘二刊本課誦之餘忽感於香山居士之言遂將兩經合刻俾誦金剛經者并誦尊勝經呪消障入道之勝因一時並進庶幾金剛經廣播尊勝經亦廣播豈非緣之絶勝者歟敬祝後之君子翻刻印行無將此本拆而為二此則僕之苦心願作禮於諸善信者也至於捐募刻資則吾邑宋君之力為多宋君名鈊佐字寶卿同治壬申歲季秋淨業學人蛟川沈開祥敬識
