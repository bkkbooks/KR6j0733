front:
  text: 引佛教西來經論東譯當知大有因緣非無由而起者般若藉奘師而弘華嚴假賢首而闡尊勝呪經非文殊大聖不能興起非波利尊者不能請翻定覺靜師敘已詳矣皇清御極時雲棲彰上人祥符尊勝幢中録斯呪經募刻未就今里內張開士佐平忽覩異光七月朔決疑於豫豫勸速印施以廣流傳古德頌云波利尊者禮五臺却被文殊化道言東土若無尊勝呪衆生難以脫塵埃是知呪經大有益於天下後世者也豫講經律論餘兼翻密部呪章細檢尊勝前後十譯唐儀鳳元年波利尊者初來朝禮五臺儀鳳四年取經還至西京一調露元年波利與朝散郎杜行顗譯二永淳元年詔命日照三藏與杜行顗共譯三光宅元年波利與順貞奏共譯四垂拱三年志靜與日照三藏宣譯五義淨三藏復譯雖五番重沓祇是一經因善住天子七日命終啓請帝釋禮佛放光為說是呪六唐三藏不空譯尊勝念誦儀即前五中之呪耳七宋三藏法天譯名最勝佛頂陀羅尼經但呪無文八法天三藏重譯名曰佛說一切如來烏瑟膩沙最勝總持經文呪俱有然兩處呪句較唐多一倍因釋迦世尊在極樂善法堂無量壽如來為觀音菩薩說九不動上師以此修潤集入施食儀軌十明仁孝皇后夢感佛說第一希有功德經前之六譯提擕六道出三途也後之四譯接引四生登九品也總之是呪為生天樂土本矣今之所行唐四譯也依經所說法益良多晝夜誦念感八勝果香花禮供具四名稱病苦者滅除疾厄短壽者增益天年薄福享用者現得消受極惡命終者出離三途鳥獸聞聲更不復墮風塵映影證大菩提一書一持成二利於善道一憶一聞獲十益於佛天明驗若此特為流通正如一寶藏中取出無盡如意珠寶散施天下後世衆生信知開士成就世間以最上第一希有之法洵有大因緣哉凡見聞隨喜者宜依教奉行之康熙庚辰年十月十一日六辛誕辰浙杭東林慈雲灌頂沙門續法槃談緣起記尊勝陀羅尼經者乃帝釋天主為善住天子七返墮畜求佛慈救而說也唐高宗時西僧波利詣五臺參文殊親受聖囑回國請至逮垂拱三年始得譯布宋元以後存儲內藏國朝初雲棲僧廣彰過祥符覩寶幢上供斯經呪不勝慶讚焚香録出曾募刻於豫因塵務羈遲刊印未果今六月望之下弦課誦耳室忽聞震聲起坐趨視見戶內電光一熌之狀驚疑數日睡夢間憶昔一老僧隱居深山日諷法華數十年寒暑不輟緣經本損壞送昭慶修整內監孫隆公偶宿湖莊步月至經房有火光射出及叩問閴無其人疑異不解次早咨決於僧僅唯修舊法華經一部耳更無他物也公往訪其僧預一日告徒衆曰明辰有人來覓我去來踪跡者待後開河之日我再來也語畢盥沐坐化而去康凞甲子年開河都憲趙公諱士麟者即此僧再來也今此現光將同是乎隨檢閲經笥中得遘尊勝録本不覺惶悚詎非我佛急欲救拔衆生之苦而現此異相者耶遂請慈雲伯亭法師對藏研核加以音釋忽友人送一文殊聖像至家豫倍生敬仰矢願裝金朝夕禮供應知豫今得覩聖容者莫非昔之波利尊宿遇化身而受囑也即倩書付劂速為印施俾天下後世之人出七趣於三乘之上超四生於十地之中見聞者夙業悉滅當得淨身讀誦者除三途苦入諸佛土是因是果豈可以凡心卜度也哉故志此前後緣由以廣弘傳時康熙三十九年歲次庚辰桂月望旦武林張世焜佐平氏薰沐拜述佛頂尊勝陀羅尼經序定覺寺沙門志靜述佛頂尊勝陀羅尼經者婆羅門僧佛陀波利儀鳳元年從西國來至此土到五臺山次遂五體投地向山頂禮曰如來滅後衆聖潛靈唯有大士文殊師利於此山中汲引蒼生教諸菩薩波利所恨生逢八難不覩聖容遠涉流沙故來敬謁伏乞大慈大悲普覆令見尊儀言已悲泣雨淚向山頂禮禮已舉頭忽見一老人從山中出來遂作婆羅門語謂僧曰法師情存慕道追訪聖蹤不憚劬勞遠尋遺跡然漢地衆生多造罪業出家之輩亦多犯戒律唯有佛頂尊勝陀羅尼經能滅除惡業未知法師頗將此經來不僧曰貧道直來禮謁不將經來老人曰既不將經空來何益縱見文殊亦何必識師可却向西國取此經來流傳漢土即是遍奉衆聖廣利羣生拯濟幽明報諸佛恩也師取經來至此弟子當示師文殊師利菩薩所在僧聞此語不勝喜躍遂裁抑悲淚至心敬禮舉頭之頃忽不見老人其僧驚愕倍更虔心繫念傾誠回還西國取佛頂尊勝陀羅尼經至永淳二年回至西京具以上事聞奏大帝大帝遂將其本入內請日照三藏法師及勑司賓寺典客令杜行顗等共譯此經勑施僧絹三十匹其經本禁在內不出其僧悲泣奏曰貧道捐軀委命遠取經來情望普濟羣生救拔苦難不以財寶為念不以名利關懷請還經本流行庶望含靈同益帝遂留翻得之經還僧梵本其僧得梵本將向西明寺訪得解善梵語漢僧順貞奏共翻譯帝隨其請僧遂對諸大德共順貞翻譯譯訖僧將梵本向五臺山入山於今不出今前後翻兩本並流行於世小小語有不同者幸勿怪焉至垂拱三年定覺寺主僧志靜因停在神都魏國東寺親見日照三藏法師問其逗留一如上說志靜遂就三藏法師咨受神呪法師於是口宣梵旨經二七日句句委授具足梵音一無差失仍更取舊翻梵本勘校所有脫錯悉皆改定其呪初注云最後別翻者是也其呪句稍異於杜令所翻者其新呪改定不錯并注其音訖後有學者幸詳此焉至永昌元年八月於大敬愛寺見西明寺上座澄法師問其逗留亦如前說其翻經僧順貞見在西明寺此經救幽顯最不可思議恐學者不知故具録委曲以傳未悟南無本師釋迦牟尼佛三稱開經偈無上甚深微妙法百千萬劫難遭遇我今見聞得受持願解如來真實義
